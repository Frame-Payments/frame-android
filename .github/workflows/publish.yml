name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@b5418f5a58f5fd2eb486dd7efb368fe7be7eae45

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Debug signing key
        env:
          SIGNING_KEY_B64: ${{ secrets.SIGNING_IN_MEMORY_KEY_BASE64 }}
        run: |
          KEY="$(echo "$SIGNING_KEY_B64" | base64 -d)"
          echo "First line: $(echo "$KEY" | head -1)"
          echo "Last line: $(echo "$KEY" | tail -1)"
          echo "Line count: $(echo "$KEY" | wc -l)"
          echo "Byte count: $(echo "$KEY" | wc -c)"

      - name: Publish all modules
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          SIGNING_KEY_B64: ${{ secrets.SIGNING_IN_MEMORY_KEY_BASE64 }}
        run: |
          KEY="$(echo "$SIGNING_KEY_B64" | base64 -d)"
          export ORG_GRADLE_PROJECT_signingInMemoryKey="$KEY"
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon -PSDK_VERSION="$VERSION"
