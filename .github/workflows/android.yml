name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  theme-lint:
    # Fast-fail check: blocks SDK UI code from drifting away from FrameTheme
    # tokens. Mirrors the iOS dark-mode lint step in frame-ios/.github/workflows/swift.yml.
    # Runs before the heavier build/test job so theme regressions surface in seconds.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Theme lint (block hardcoded colors / fonts / radii in SDK UI)
        run: ./scripts/theme-lint.sh

  kdoc-lint:
    # Fails if any public symbol in the SDK modules is missing a KDoc block.
    # Gate for the KDoc backfill (FRA-3959): new public symbols must be documented from day one.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: KDoc lint (Detekt — UndocumentedPublicClass/Function/Property)
        run: ./gradlew :FrameSDK:detekt :FrameSDK-UI:detekt :FrameSDK-Onboarding:detekt --stacktrace

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: "**/build/reports/detekt/**"

  build-and-test:
    needs: [theme-lint, kdoc-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@b5418f5a58f5fd2eb486dd7efb368fe7be7eae45 # v2.1.3

      - name: Gradle build cache
        uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Compile every module so any breakage in FrameSDK-UI / FrameSDK-Onboarding
      # / app surfaces in CI (the previous workflow only ran `test`, which on the
      # FrameSDK module is a no-op for UI modules without unit tests).
      - name: Assemble debug
        run: ./gradlew :FrameSDK-UI:assembleDebug :FrameSDK-Onboarding:assembleDebug :app:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: "**/build/reports/tests/**"
